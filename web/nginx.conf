# ReSALE web (nginx) — SPA-friendly static serving.
server {
  listen       80;
  server_name  _;
  root   /usr/share/nginx/html;
  index  index.html;

  # Gzip text assets for faster first paint.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Long-cache fingerprinted build assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Lightweight liveness endpoint for Docker/k8s probes.
  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  # SPA history fallback: unknown paths serve index.html (client-side routing).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Baseline security headers (defense in depth; API sets its own too).
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer always;
}
