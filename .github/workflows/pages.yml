name: Pages

# Publishes the self-contained dashboards in report/ to GitHub Pages so they can
# be opened in a browser without cloning:
#   https://<owner>.github.io/<repo>/         -> report/index.html  (overview)
#   https://<owner>.github.io/<repo>/index1.html -> final pitch dashboard
#
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source: GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: report
      - id: deployment
        uses: actions/deploy-pages@v4
